apiVersion: v1
kind: ConfigMap
metadata:
  name: pageragent-runtime
  namespace: pageragent
  labels:
    app.kubernetes.io/name: pageragent
    app.kubernetes.io/part-of: pageragent
data:
  PAGERAGENT_ENV: production
  PAGERAGENT_AUTH_MODE: oidc
  PAGERAGENT_TRUSTED_HOSTS: pageragent.example.com
  PAGERAGENT_HEALTH_HOST: pageragent.example.com
  PAGERAGENT_SESSION_COOKIE_NAME: __Host-pageragent_session
  PAGERAGENT_SESSION_COOKIE_SECURE: "true"
  PAGERAGENT_SESSION_TTL_SECONDS: "28800"
  PAGERAGENT_OIDC_LOGIN_COOKIE_NAME: __Host-pageragent_oidc_login
  PAGERAGENT_OIDC_LOGIN_TTL_SECONDS: "300"
  PAGERAGENT_OIDC_HTTP_TIMEOUT_SECONDS: "5"
  PAGERAGENT_OIDC_MAX_RESPONSE_BYTES: "262144"
  PAGERAGENT_CONNECTOR_CIPHER_PROVIDER: aws_kms
  PAGERAGENT_CONNECTOR_KMS_APPLICATION_ID: pageragent
  PAGERAGENT_CONNECTOR_KMS_CONNECT_TIMEOUT_SECONDS: "3"
  PAGERAGENT_CONNECTOR_KMS_READ_TIMEOUT_SECONDS: "5"
  PAGERAGENT_CONNECTOR_KMS_MAX_ATTEMPTS: "3"
  PAGERAGENT_CONNECTOR_KEY_VERSION: kms-v1
  PAGERAGENT_CONNECTOR_DECRYPTION_KEYS: "{}"
  PAGERAGENT_CONNECTOR_ALLOWED_ORIGINS: https://api.github.com,https://slack.com,https://prometheus.example.com
  PAGERAGENT_TELEMETRY_ALLOWED_ORIGINS: https://telemetry.example.com
  GITHUB_EVIDENCE_MODE: connector
  PROMETHEUS_EVIDENCE_MODE: connector
  BACKEND_CORS_ORIGINS: https://pageragent.example.com
  RUNBOOK_DIRECTORY: /runbooks
  COMMIT_FIXTURE_PATH: /scenarios/checkout-commits.json
  SCENARIO_DIRECTORY: /scenarios
  AUTO_INVESTIGATE_INCIDENTS: "true"
  AUTO_GENERATE_PROPOSALS: "true"
  AUTO_GENERATE_POSTMORTEMS: "true"
  DURABLE_MITIGATION_ENABLED: "false"
  WORKFLOW_STREAM_NAME: pageragent.workflows
  WORKFLOW_CONSUMER_GROUP: pageragent-workers
  WORKFLOW_DEAD_LETTER_STREAM: pageragent.workflows.dlq
  WORKFLOW_MAX_ATTEMPTS: "5"
  WORKFLOW_LEASE_SECONDS: "30"
  WORKFLOW_RECLAIM_IDLE_SECONDS: "35"
  WORKFLOW_POLL_INTERVAL_SECONDS: "0.5"
  WORKFLOW_RETRY_BASE_SECONDS: "2"
  WORKFLOW_DELIVERY_REPAIR_SECONDS: "60"
  OTEL_CONSOLE_EXPORTER: "false"
