apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: pageragent-api
  namespace: pageragent
  labels:
    app.kubernetes.io/name: pageragent-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: pageragent
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pageragent-api
      app.kubernetes.io/component: api
---
