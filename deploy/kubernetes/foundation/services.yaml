apiVersion: v1
kind: Service
metadata:
  name: pageragent-api
  namespace: pageragent
  labels:
    app.kubernetes.io/name: pageragent-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: pageragent
spec:
  selector:
    app.kubernetes.io/name: pageragent-api
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: pageragent-frontend
  namespace: pageragent
  labels:
    app.kubernetes.io/name: pageragent-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: pageragent
spec:
  selector:
    app.kubernetes.io/name: pageragent-frontend
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 80
      targetPort: http
