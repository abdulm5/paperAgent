apiVersion: batch/v1
kind: Job
metadata:
  name: pageragent-migrate
  namespace: pageragent
  labels:
    app.kubernetes.io/name: pageragent-migrate
    app.kubernetes.io/component: migration
    app.kubernetes.io/part-of: pageragent
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      annotations:
        pageragent.dev/release-revision: scaffold
        pageragent.dev/runtime-secret-revision: external-v1
      labels:
        app.kubernetes.io/name: pageragent-migrate
        app.kubernetes.io/component: migration
        app.kubernetes.io/part-of: pageragent
    spec:
      restartPolicy: Never
      serviceAccountName: pageragent-migration
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migration
          image: pageragent-backend:0.0.0
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -m
            - app.db.migrate
          envFrom:
            - configMapRef:
                name: pageragent-runtime
            - secretRef:
                name: pageragent-database-secrets
          env:
            - name: SERVICE_NAME
              value: pageragent-migration
            - name: OTEL_SERVICE_NAME
              value: pageragent-migration
            - name: PAGERAGENT_CONNECTOR_CIPHER_PROVIDER
              value: local
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
