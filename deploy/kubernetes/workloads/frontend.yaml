apiVersion: apps/v1
kind: Deployment
metadata:
  name: pageragent-frontend
  namespace: pageragent
  labels:
    app.kubernetes.io/name: pageragent-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: pageragent
spec:
  replicas: 2
  revisionHistoryLimit: 5
  progressDeadlineSeconds: 300
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pageragent-frontend
      app.kubernetes.io/component: frontend
  template:
    metadata:
      annotations:
        pageragent.dev/release-revision: scaffold
        pageragent.dev/runtime-secret-revision: external-v1
      labels:
        app.kubernetes.io/name: pageragent-frontend
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: pageragent
    spec:
      serviceAccountName: pageragent-frontend
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: pageragent-frontend:0.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 32Mi
        - name: nginx-cache
          emptyDir:
            sizeLimit: 32Mi
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: pageragent-frontend
              app.kubernetes.io/component: frontend
