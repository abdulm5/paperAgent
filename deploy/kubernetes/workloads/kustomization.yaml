apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: pageragent
resources:
  - api.yaml
  - workflow-worker.yaml
  - outbox-relay.yaml
  - frontend.yaml
images:
  - name: pageragent-backend
    newName: ghcr.io/replace-me/pageragent-backend
    newTag: 0.0.0
  - name: pageragent-frontend
    newName: ghcr.io/replace-me/pageragent-frontend
    newTag: 0.0.0
