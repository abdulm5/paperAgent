services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pageragent
      POSTGRES_USER: pageragent
      POSTGRES_PASSWORD: pageragent
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pageragent -d pageragent"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - redis-data:/data

  backend:
    build:
      context: ./backend
      target: development
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://pageragent:pageragent@postgres:5432/pageragent
      REDIS_URL: redis://redis:6379/0
      RUNBOOK_DIRECTORY: /runbooks
      COMMIT_FIXTURE_PATH: /scenarios/checkout-commits.json
      SCENARIO_DIRECTORY: /scenarios
      AUTO_INVESTIGATE_INCIDENTS: "true"
      AUTO_GENERATE_PROPOSALS: "true"
      AUTO_GENERATE_POSTMORTEMS: "true"
      DURABLE_MITIGATION_ENABLED: "true"
      CHECKOUT_CONTROL_URL: http://checkout-api:8100
      PAGERAGENT_TELEMETRY_ALLOWED_ORIGINS: http://checkout-api:8100
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - ./backend:/app
      - ./runbooks:/runbooks:ro
      - ./scenarios:/scenarios:ro
    depends_on:
      postgres:
        condition: service_healthy
      checkout-api:
        condition: service_healthy

  outbox-relay:
    build:
      context: ./backend
      target: development
    command: python -m app.workflows.worker relay
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_NAME: pageragent-outbox-relay
      DATABASE_URL: postgresql+psycopg://pageragent:pageragent@postgres:5432/pageragent
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy

  workflow-worker:
    build:
      context: ./backend
      target: development
    command: python -m app.workflows.worker work
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_NAME: pageragent-workflow-worker
      DATABASE_URL: postgresql+psycopg://pageragent:pageragent@postgres:5432/pageragent
      REDIS_URL: redis://redis:6379/0
      RUNBOOK_DIRECTORY: /runbooks
      COMMIT_FIXTURE_PATH: /scenarios/checkout-commits.json
      SCENARIO_DIRECTORY: /scenarios
      CHECKOUT_CONTROL_URL: http://checkout-api:8100
      PAGERAGENT_TELEMETRY_ALLOWED_ORIGINS: http://checkout-api:8100
    volumes:
      - ./backend:/app
      - ./runbooks:/runbooks:ro
      - ./scenarios:/scenarios:ro
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
      checkout-api:
        condition: service_healthy

  checkout-api:
    build:
      context: ./simulator
      target: development
    command: uvicorn app.main:app --host 0.0.0.0 --port 8100 --reload
    ports:
      - "8100:8100"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8100/health')"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - ./simulator:/app

  alert-evaluator:
    build:
      context: ./simulator
      target: development
    command:
      - python
      - -m
      - app.monitor
      - --checkout-api-url
      - http://checkout-api:8100
      - --pageragent-api-url
      - http://backend:8000
      - --ingest-api-key
      - "${PAGERAGENT_INGEST_API_KEY:-pageragent-local-ingest-key}"
      - --threshold
      - "${ALERT_ERROR_RATE_THRESHOLD:-0.05}"
      - --minimum-requests
      - "${ALERT_MINIMUM_REQUESTS:-60}"
      - --window-seconds
      - "${ALERT_WINDOW_SECONDS:-300}"
      - --poll-interval
      - "0.5"
    volumes:
      - ./simulator:/app
    depends_on:
      backend:
        condition: service_healthy
      checkout-api:
        condition: service_healthy

  traffic-generator:
    profiles: ["tools"]
    build:
      context: ./simulator
      target: development
    entrypoint: ["python", "-m", "app.traffic", "--base-url", "http://checkout-api:8100"]
    volumes:
      - ./simulator:/app
    depends_on:
      checkout-api:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: development
    command: npm run dev -- --host 0.0.0.0
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      - backend

volumes:
  postgres-data:
  redis-data:
  frontend-node-modules:
